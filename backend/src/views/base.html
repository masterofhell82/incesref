<!doctype html>
<html lang="{% block html_lang %}es{% endblock %}">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="pdfkit-page-size" content="A4" />
        <meta name="pdfkit-orientation" content="Landscape" />
        <link
            rel="stylesheet"
            href="{{ base_url + url_for('static', filename='node_modules/bootstrap/dist/css/bootstrap.min.css') }}"
        />
        <script src="{{ base_url + url_for('static', filename='node_modules/jquery/dist/jquery.js') }}"></script>
        <script src="{{ base_url + url_for('static', filename='node_modules/bootstrap/dist/js/bootstrap.min.js') }}"></script>
        <style>
            @page {
                size: A4 landscape;
                margin: 0;
            }

            .table.bg-transparent,
            .table.bg-transparent th,
            .table.bg-transparent td {
                background-color: transparent !important;
            }

            @font-face {
                font-family: "hellas";
                src: url("{{ base_url + url_for('static', filename='fonts/HFUNB.TTF') }}")
                    format("truetype");
                font-weight: 500;
                font-style: normal;
            }

            @font-face {
                font-family: "Geometos";
                src: url("{{ base_url + url_for('static', filename='fonts/Geometos.ttf') }}")
                    format("truetype");
                font-weight: 500;
                font-style: normal;
            }

            @font-face {
                font-family: "Spartan-Bold";
                src: url("{{ base_url + url_for('static', filename='fonts/Spartan-Bold.ttf') }}")
                    format("truetype");
                font-weight: 700;
                font-style: normal;
            }

            @font-face {
                font-family: "Fertigo";
                src: url("{{ base_url + url_for('static', filename='fonts/Fertigo Regular.otf') }}")
                    format("opentype");
                font-weight: 400;
                font-style: normal;
            }

            @font-face {
                font-family: "Philosopher";
                src: url("{{ base_url + url_for('static', filename='fonts/Philosopher-Regular.ttf') }}")
                    format("truetype");
                font-weight: 400;
                font-style: normal;
            }

            @font-face {
                font-family: "Philosopher";
                src: url("{{ base_url + url_for('static', filename='fonts/Philosopher-Bold.ttf') }}")
                    format("truetype");
                font-weight: bold;
                font-style: normal;
            }

            @font-face {
                font-family: "clusty";
                src: url("{{ base_url + url_for('static', filename='fonts/clusty-bold.otf') }}")
                    format("opentype");
                font-weight: 700;
                font-style: normal;
            }

            @font-face {
                font-family: "Montserrat";
                src: url("{{ base_url + url_for('static', filename='fonts/Montserrat-Regular.ttf') }}")
                    format("truetype");
                font-weight: 400;
                font-style: normal;
            }

            @font-face {
                font-family: "Montserrat";
                src: url("{{ base_url + url_for('static', filename='fonts/Montserrat-Medium.ttf') }}")
                    format("truetype");
                font-weight: 500;
                font-style: normal;
            }

            @font-face {
                font-family: "Montserrat";
                src: url("{{ base_url + url_for('static', filename='fonts/Montserrat-SemiBold.ttf') }}")
                    format("truetype");
                font-weight: 600;
                font-style: normal;
            }

            @font-face {
                font-family: "Montserrat";
                src: url("{{ base_url + url_for('static', filename='fonts/Montserrat-Bold.ttf') }}")
                    format("truetype");
                font-weight: 700;
                font-style: normal;
            }

            @font-face {
                font-family: "Montserrat";
                src: url("{{ base_url + url_for('static', filename='fonts/Montserrat-Black.ttf') }}")
                    format("truetype");
                font-weight: 900;
                font-style: normal;
            }
            @font-face {
                font-family: "Montserrat";
                src: url("{{ base_url + url_for('static', filename='fonts/Montserrat-ExtraBold.ttf') }}")
                    format("truetype");
                font-weight: 800;
                font-style: normal;
            }

            @font-face {
                font-family: "GreatVibes";
                src: url("{{ base_url + url_for('static', filename='fonts/GreatVibes-Regular.ttf') }}")
                    format("truetype");
                font-style: normal;
            }

            @font-face {
                font-family: "PlayfairDisplay";
                src: url("{{ base_url + url_for('static', filename='fonts/PlayfairDisplay-Regular.ttf') }}")
                    format("truetype");
                font-style: normal;
                font-weight: 400;
            }

            @font-face {
                font-family: "PlayfairDisplay";
                src: url("{{ base_url + url_for('static', filename='fonts/PlayfairDisplay-Bold.ttf') }}")
                    format("truetype");
                font-style: normal;
                font-weight: 700;
            }

            body {
                font-family: "Arial", sans-serif;
                margin: 0;
                padding: 0;
            }

            img {
                filter: contrast(1.5); /* Aumenta el contraste en un 50% */
            }

            .content {
                padding: 60px;
                position: relative;
                z-index: 1;
                background-color: transparent !important;
            }

            .control-head {
                color: black;
                font-size: 15px;
            }

            .control-number {
                color: black;
                font-size: 18px;
            }

            .control-table {
                font-size: 17px;
            }

            hr {
                border: 0 !important;
                border-top: 3px solid #333565 !important;
                color: #333565 !important;
                background-color: #333565 !important;
                opacity: 1 !important;
                height: 0;
            }

            .no-border table,
            .no-border th,
            .no-border td {
                border: none !important;
            }

            .no-background table,
            .no-background th,
            .no-background td {
                background-color: transparent !important;
            }

            th {
                font-weight: bold !important;
                font-size: 18px;
            }

            .title-certifica {
                font-size: 100px;
                color: #333565;
                font-family: "Montserrat", sans-serif;
                font-weight: 800;
                font-synthesis: weight;
            }

            .title-ortoga {
                font-family: "Fertigo", serif;
                font-size: 35px;
                color: #0e78a7;
                margin-bottom: -5px;
            }

            .fullnames {
                /* font-family: "GreatVibes", cursive; */
                font-family: "Montserrat", sans-serif;
                font-weight: 600;
                /* font-size: 75px; */
                font-size: 50px;
                color: #333565;
            }

            .foid {
                font-family: "Philosopher", sans-serif;
                font-size: 44px;
                font-weight: bold;
                color: #0e78a7;
                margin-top: -10px;
            }

            .formation {
                text-align: center;
                color: #5b5b5e;
                font-family: "Montserrat", sans-serif;
                font-synthesis: weight;
                font-size: 35px;
                line-height: 1.2;
                overflow-wrap: break-word;
                word-break: normal;
                max-width: 90%;
                margin: 0 auto;
            }

            .sign {
                height: 185px;
                font-size: 20px;
                padding-left: 120px;
                padding-right: 120px;
                position: absolute;
                left: 0;
                right: 0;
                bottom: 70px;
            }

            .img-signature-float {
                border-radius: 8px;
                z-index: 2;
                max-width: 200px;
                max-height: 100px;
                position: relative;
                top: 50px;
                right: -17px;
            }

            .who-signature {
                text-align: center;
                font-size: 18px;
                color: #5b5b5e;
                font-family: "PlayfairDisplay", serif;
                font-weight: 600;
            }

            .position-signature {
                text-align: center;
                font-size: 18px;
                color: #5b5b5e;
                font-family: "PlayfairDisplay", serif;
                font-weight: 400;
            }

            .date_emition {
                text-align: center;
                font-size: 18px;
                color: #2b2b2e;
                font-family: "Philosopher", serif;
                font-weight: 400;
                margin-top: 20px;
                left: 0;
                right: 0;
                bottom: 20px;
                position: absolute;
            }

            .descripcion {
                font-size: 12px;
            }

            .qrcode {
                top: 700px;
                right: 10px;
                position: absolute;
                width: 260px;
            }

            .qrcode img {
                width: 230px;
                background: #ffffffec;
                padding: 10px;
                border-radius: 10px;
            }

            .qrcode a {
                font-family: "Montserrat", sans-serif;
                color: #102638;
                text-decoration: none;
            }

            .signature-float {
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
                border-radius: 8px;
            }

            .single-signature {
                width: 100%;
                text-align: center;
            }

            .single-signature img {
                display: block;
                max-width: 200px;
                max-height: 100px;
                margin: 0 auto 12px;
            }

            .single-signature hr {
                width: 280px;
                margin: 0 auto 12px;
            }

            .fs2 {
                font-size: 30px;
            }

            .fs-5 {
                font-size: 18px;
            }

            .fwbold {
                font-weight: bolder;
            }

            footer {
                position: relative;
                bottom: 0;
            }
        </style>
        {% block styles %}{% endblock %} {% block head %}{% endblock %}
    </head>
    <body>
        {% block body %}{% endblock %}
    </body>
</html>
